
name: Bursa 15Min Update

on:
  schedule:
    - cron: '*/15 1-9 * * 1-5'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install yfinance pandas

      - name: Execute Scraper
        run: python update_data.py

      - name: Push to Repo
        run: |
          git config --global user.name "BursaBot"
          git config --global user.email "bot@github.com"
          git add bursa_live_data.csv
          git commit -m "Auto-update: $(date)" || exit 0
          git push
