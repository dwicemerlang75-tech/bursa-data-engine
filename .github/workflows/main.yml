import yfinance as yf
import pandas as pd
import datetime
import time

# URL CSV dari Google Sheets hang
SHEET_URL = "https://docs.google.com/spreadsheets/d/1aoNh8FUQTmkFshV5qlmrUi2EeUNvla7pYROK_Wb6MgI/export?format=csv&gid=0"

def fetch_and_save():
    try:
        # 1. Baca list dari Google Sheets
        df_list = pd.read_csv(SHEET_URL)
        
        # Pastikan column TICKER wujud, kalau tak dia ambil column pertama
        ticker_col = 'TICKER' if 'TICKER' in df_list.columns else df_list.columns[0]
        tickers = df_list[ticker_col].dropna().unique().tolist()
        
        # Bersihkan whitespace kalau ada
        tickers = [str(t).strip() for t in tickers if t]
        
        print(f"Memulakan tarikan data untuk {len(tickers)} kaunter...")

        # 2. Tarik data (pecah kepada batch kecil untuk elok kena ban)
        data = yf.download(
            tickers=tickers,
            period="1d",
            interval="15m",
            group_by='ticker',
            threads=True,
            progress=True
        )

        if not data.empty:
            data.to_csv("bursa_live_data.csv")
            print(f"Berjaya simpan bursa_live_data.csv pada: {datetime.datetime.now()}")
        else:
            print("Data kosong. Sila check list ticker dalam Google Sheets.")
            
    except Exception as e:
        print(f"Error berlaku: {str(e)}")
        exit(1) # Bagitahu GitHub ada error

if __name__ == "__main__":
    fetch_and_save()
